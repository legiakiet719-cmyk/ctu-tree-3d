<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>WebGIS 3D - Quản lý Cây xanh Khu II ĐH Cần Thơ</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.105/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.105/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        html, body, #cesiumContainer { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; font-family: Arial, sans-serif; background-color: #a3ccff; }
        #panel {
            position: absolute; top: 20px; left: 20px; width: 340px;
            background: rgba(255, 255, 255, 0.95); padding: 20px;
            border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 1000; pointer-events: auto;
        }
        h3 { margin-top: 0; color: #0056b3; border-bottom: 2px solid #0056b3; padding-bottom: 8px; font-size: 16px; text-transform: uppercase; text-align: center;}
        .search-box { display: flex; gap: 8px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px dashed #ccc; }
        .search-box input { flex: 1; padding: 8px; border: 1px solid #0056b3; border-radius: 4px; font-size: 13px; }
        .search-box button { background: #0056b3; color: white; border: none; border-radius: 4px; padding: 0 12px; cursor: pointer; font-weight: bold; font-size: 13px; transition: 0.2s;}
        .search-box button:hover { background: #004494; }
        .form-group { margin-bottom: 12px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; font-size: 13px; color: #333;}
        input[type="text"], input[type="number"] { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 14px;}
        .result-box { background: #eef7fc; padding: 12px; border-radius: 6px; margin-top: 15px; font-size: 13px; border: 1px solid #cce3f6;}
        .result-item { margin-bottom: 8px; display: flex; justify-content: space-between;}
        .emphasis { font-weight: bold; color: #d32f2f; }
        .author-info { font-size: 11px; color: #666; text-align: center; margin-top: 20px; border-top: 1px solid #ddd; padding-top: 12px; line-height: 1.5; }
    </style>
</head>
<body>

    <div id="panel">
        <h3>Quản lý Cây xanh 3D</h3>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Nhập mã số cây (VD: 89)...">
            <button id="searchBtn">Tìm</button>
        </div>
        <div id="instruction" style="font-size: 13px; color: #555; text-align: center; margin-bottom: 10px;">
            <i>Nhấp chọn cây hoặc nhập mã số để tra cứu.</i>
        </div>
        <div id="formFields" style="display: none;">
            <div class="form-group"><label>Mã số cây:</label><input type="text" id="treeId" disabled style="background:#e9ecef; font-weight: bold; color: #d32f2f;"></div>
            <div class="form-group"><label>Loại cây:</label><input type="text" id="treeType" disabled style="background:#e9ecef;"></div>
            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 1;"><label>DBH (cm):</label><input type="number" id="treeDBH" step="0.1" min="1"></div>
                <div class="form-group" style="flex: 1;"><label>Cao H (m):</label><input type="number" id="treeH" step="0.1" min="0.1"></div>
            </div>
            <div class="result-box">
                <div class="result-item"><span>Sinh khối (AGB):</span> <span id="resAGB" class="emphasis">0 kg</span></div>
                <div class="result-item"><span>Carbon tích lũy:</span> <span id="resC" class="emphasis">0 kg</span></div>
                <div class="result-item"><span>CO2 hấp thụ:</span> <span id="resCO2" class="emphasis">0 kg</span></div>
            </div>
        </div>
        <div class="author-info">
            SVTH: <b>Lê Gia Kiệt</b> | MSSV: <b>B2301723</b><br>
            Ngành: Quản lý đất đai - ĐH Cần Thơ
        </div>
    </div>

    <div id="cesiumContainer"></div>

    <script>
        // TOKEN CỦA BẠN
        Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJiN2NmOTkxMy1hZWY2LTQxNDAtYjVmZS01YjgwOGZhZGY3YWUiLCJpZCI6NDQ4OTAyLCJpc3MiOiJodHRwczovL2FwaS5jZXNpdW0uY29tIiwiYXVkIjoidW5kZWZpbmVkX2RlZmF1bHQiLCJpYXQiOjE3ODIzNzYyNDd9.dvcfbusRjzXYmTRnvL9ofWWo3pgygC_fai-G3UQGq3k';

        // -------------------------------------------------------------
        // CẤU HÌNH SIÊU TỐI ƯU (CHỐNG LAG TUYỆT ĐỐI)
        // -------------------------------------------------------------
        const viewer = new Cesium.Viewer('cesiumContainer', {
            imageryProvider: new Cesium.UrlTemplateImageryProvider({
                url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
                subdomains: ['a', 'b', 'c']
            }),
            terrainProvider: undefined, // Tắt địa hình
            animation: false, timeline: false, infoBox: false,
            baseLayerPicker: false, navigationHelpButton: false,
            sceneModePicker: false, geocoder: false, homeButton: false,
            fullscreenButton: false, skyAtmosphere: false, skyBox: false
        });

        // Ép hệ thống không render các hiệu ứng thừa
        viewer.scene.fog.enabled = false;
        viewer.scene.globe.showGroundAtmosphere = false;
        viewer.scene.postProcessStages.fxaa.enabled = false; 
        viewer.scene.shadowMap.enabled = false; 

        // Đặt góc quay vào Khu II
        viewer.camera.setView({
            destination: Cesium.Cartesian3.fromDegrees(105.768, 10.030, 800), 
            orientation: { heading: 0.0, pitch: Cesium.Math.toRadians(-45), roll: 0.0 } 
        });

        // Bật lớp tòa nhà 3D
        Cesium.createOsmBuildingsAsync().then(function(buildings) {
            viewer.scene.primitives.add(buildings);
        });

        let selectedEntity = null;

        function calculateBiomass(dbh) {
            const agb = 0.0509 * Math.pow(dbh, 2);
            const c = agb * 0.47;
            const co2 = c * 3.667;
            return { agb: agb.toFixed(2), c: c.toFixed(2), co2: co2.toFixed(2) };
        }

        // -------------------------------------------------------------
        // ĐỌC FILE DỮ LIỆU ĐÃ ĐƯỢC CHỈ ĐỊNH ĐÚNG TÊN
        // -------------------------------------------------------------
        fetch('ctu_biomass3.geojson')
            .then(response => response.json())
            .then(geojsonData => {
                geojsonData.features.forEach(feature => {
                    const coords = feature.geometry.coordinates;
                    const props = feature.properties;
                    
                    if (!coords) return; // Tránh lỗi nếu có điểm bị mất tọa độ

                    const dbhInit = parseFloat(props["DBH1.3"]) || 15.0;
                    // Lấy cột H, nếu cây nào thiếu H thì tạm lấy 0.3 * DBH
                    const hInit = parseFloat(props["H"]) || (dbhInit * 0.3); 
                    const metrics = calculateBiomass(dbhInit);
                    const treeNumber = props["Number_tre"] ? props["Number_tre"].toString() : "N/A";

                    viewer.entities.add({
                        id: treeNumber,
                        // ĐẨY TRỤC Z LÊN hInit/2 ĐỂ CÂY KHÔNG CHÌM XUỐNG ĐẤT
                        position: Cesium.Cartesian3.fromDegrees(coords[0], coords[1], hInit / 2),
                        name: "Cây số " + treeNumber,
                        properties: {
                            id: treeNumber, type: props["Type_tree"] || "Xoài",
                            dbh: dbhInit, h: hInit,
                            agb: metrics.agb, c: metrics.c, co2: metrics.co2
                        },
                        cylinder: {
                            length: hInit,
                            // Độ rộng cây tỷ lệ với DBH
                            topRadius: dbhInit * 0.06,
                            bottomRadius: dbhInit * 0.06,
                            slices: 6, // Render dạng khối lục giác để load 6.500 cây cực mượt
                            material: Cesium.Color.fromCssColorString('#2ecc71').withAlpha(0.9)
                        }
                    });
                });
            })
            .catch(error => console.log("Lỗi tải file:", error));

        function populateForm(entity) {
            selectedEntity = entity;
            document.getElementById('instruction').style.display = 'none';
            document.getElementById('formFields').style.display = 'block';
            document.getElementById('treeId').value = selectedEntity.properties.id.getValue();
            document.getElementById('treeType').value = selectedEntity.properties.type.getValue();
            document.getElementById('treeDBH').value = selectedEntity.properties.dbh.getValue();
            document.getElementById('treeH').value = selectedEntity.properties.h.getValue();
            updateLabels(selectedEntity.properties.agb.getValue(), selectedEntity.properties.c.getValue(), selectedEntity.properties.co2.getValue());
        }

        const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
        handler.setInputAction(function(movement) {
            const pickedObject = viewer.scene.pick(movement.position);
            if (Cesium.defined(pickedObject) && pickedObject.id) {
                populateForm(pickedObject.id);
            }
        }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

        document.getElementById('searchBtn').addEventListener('click', function() {
            const searchVal = document.getElementById('searchInput').value.trim();
            if (!searchVal) return;
            const targetEntity = viewer.entities.getById(searchVal);
            if (targetEntity) {
                viewer.flyTo(targetEntity, { duration: 2.0, offset: new Cesium.HeadingPitchRange(0, Cesium.Math.toRadians(-45), 35) });
                populateForm(targetEntity);
            } else {
                alert("Không tìm thấy cây có mã số: " + searchVal);
            }
        });

        document.getElementById('searchInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') document.getElementById('searchBtn').click();
        });

        // -------------------------------------------------------------
        // TƯƠNG TÁC THAY ĐỔI DBH VÀ CHIỀU CAO H
        // -------------------------------------------------------------
        document.getElementById('treeDBH').addEventListener('input', function(e) {
            if (!selectedEntity) return;
            const newDBH = parseFloat(e.target.value);
            if (isNaN(newDBH) || newDBH <= 0) return;

            const newMetrics = calculateBiomass(newDBH);
            selectedEntity.properties.dbh.setValue(newDBH);
            selectedEntity.properties.agb.setValue(newMetrics.agb);
            selectedEntity.properties.c.setValue(newMetrics.c);
            selectedEntity.properties.co2.setValue(newMetrics.co2);

            // Cây to ra hoặc nhỏ lại
            selectedEntity.cylinder.topRadius = newDBH * 0.06;
            selectedEntity.cylinder.bottomRadius = newDBH * 0.06;
            updateLabels(newMetrics.agb, newMetrics.c, newMetrics.co2);
        });

        document.getElementById('treeH').addEventListener('input', function(e) {
            if (!selectedEntity) return;
            const newH = parseFloat(e.target.value);
            if (isNaN(newH) || newH <= 0) return;

            selectedEntity.properties.h.setValue(newH);
            selectedEntity.cylinder.length = newH;
            
            // Kéo dài cây và đẩy tọa độ Z lên để gốc cây luôn chạm đất
            const coords = selectedEntity.position.getValue(Cesium.JulianDate.now());
            const cartographic = Cesium.Cartographic.fromCartesian(coords);
            selectedEntity.position = Cesium.Cartesian3.fromRadians(cartographic.longitude, cartographic.latitude, newH / 2);
        });

        function updateLabels(agb, c, co2) {
            document.getElementById('resAGB').innerText = agb + " kg";
            document.getElementById('resC').innerText = c + " kg";
            document.getElementById('resCO2').innerText = co2 + " kg";
        }
    </script>
</body>
</html>
