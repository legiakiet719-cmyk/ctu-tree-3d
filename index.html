<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>WebGIS 3D - Quản lý Cây xanh Khu II ĐH Cần Thơ</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.105/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.105/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        html, body, #cesiumContainer { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; font-family: Arial, sans-serif; }
        #panel {
            position: absolute; top: 20px; left: 20px; width: 340px;
            background: rgba(255, 255, 255, 0.95); padding: 20px;
            border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 1000; pointer-events: auto;
        }
        h3 { margin-top: 0; color: #0056b3; border-bottom: 2px solid #0056b3; padding-bottom: 8px; font-size: 16px; text-transform: uppercase; text-align: center;}
        .form-group { margin-bottom: 12px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; font-size: 13px; color: #333;}
        input[type="text"], input[type="number"] { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 14px;}
        .result-box { background: #eef7fc; padding: 12px; border-radius: 6px; margin-top: 15px; font-size: 13px; border: 1px solid #cce3f6;}
        .result-item { margin-bottom: 8px; display: flex; justify-content: space-between;}
        .emphasis { font-weight: bold; color: #d32f2f; }
        .author-info { font-size: 11px; color: #666; text-align: center; margin-top: 20px; border-top: 1px solid #ddd; padding-top: 12px; line-height: 1.5; }
    </style>
</head>
<body>
    <div id="panel">
        <h3>Quản lý Hiện trạng Cây xanh 3D</h3>
        <div id="instruction" style="font-size: 13px; color: #555; text-align: center; margin-bottom: 10px;">
            <i>Nhấp chọn một cây trên bản đồ 3D để xem và mô phỏng thông số.</i>
        </div>
        <div id="formFields" style="display: none;">
            <div class="form-group"><label>Mã số cây:</label><input type="text" id="treeId" disabled style="background:#e9ecef;"></div>
            <div class="form-group"><label>Loại cây:</label><input type="text" id="treeType" disabled style="background:#e9ecef;"></div>
            <div class="form-group"><label>Đường kính DBH (cm):</label><input type="number" id="treeDBH" step="0.1" min="1"></div>
            <div class="result-box">
                <div class="result-item"><span>Sinh khối (AGB):</span> <span id="resAGB" class="emphasis">0 kg</span></div>
                <div class="result-item"><span>Carbon tích lũy:</span> <span id="resC" class="emphasis">0 kg</span></div>
                <div class="result-item"><span>CO2 hấp thụ:</span> <span id="resCO2" class="emphasis">0 kg</span></div>
            </div>
        </div>
        <div class="author-info">
            SVTH: <b>Lê Gia Kiệt</b> | MSSV: <b>B2301723</b><br>
            Ngành: Quản lý đất đai - ĐH Cần Thơ
        </div>
    </div>

    <div id="cesiumContainer"></div>

    <script>
        // DÁN MÃ TOKEN CỦA BẠN VÀO GIỮA 2 DẤU NHÁY ĐƠN DƯỚI ĐÂY
        Cesium.Ion.defaultAccessToken = 'YOUR_CESIUM_ION_TOKEN_HERE';

        const viewer = new Cesium.Viewer('cesiumContainer', {
            terrainProvider: Cesium.createWorldTerrain(),
            animation: false, timeline: false, infoBox: false,
            baseLayerPicker: false, navigationHelpButton: false
        });

        viewer.camera.setView({
            destination: Cesium.Cartesian3.fromDegrees(105.768, 10.030, 450), 
            orientation: { heading: 0.0, pitch: Cesium.Math.toRadians(-45), roll: 0.0 } 
        });

        // Bật lớp Tòa nhà 3D
        Cesium.createOsmBuildingsAsync().then(function(buildings) {
            viewer.scene.primitives.add(buildings);
        });

        let selectedEntity = null;

        function calculateBiomass(dbh) {
            const agb = 0.0509 * Math.pow(dbh, 2);
            const c = agb * 0.47;
            const co2 = c * 3.667;
            return { agb: agb.toFixed(2), c: c.toFixed(2), co2: co2.toFixed(2) };
        }

        fetch('ctu_biomass.geojson')
            .then(response => response.json())
            .then(geojsonData => {
                geojsonData.features.forEach(feature => {
                    const coords = feature.geometry.coordinates;
                    const props = feature.properties;
                    const dbhInit = parseFloat(props["DBH1.3"]) || 15.0;
                    const metrics = calculateBiomass(dbhInit);

                    viewer.entities.add({
                        position: Cesium.Cartesian3.fromDegrees(coords[0], coords[1], 0),
                        name: "Cây số " + (props["Number_tre"] || "Chưa rõ"),
                        properties: {
                            id: props["Number_tre"] || "N/A", type: props["Type_tree"] || "Xoài",
                            dbh: dbhInit, agb: metrics.agb, c: metrics.c, co2: metrics.co2
                        },
                        // Mô phỏng cây bằng khối Elip xanh lá siêu nhẹ
                        ellipsoid: {
                            radii: new Cesium.Cartesian3(dbhInit * 0.1, dbhInit * 0.1, dbhInit * 0.15),
                            material: Cesium.Color.fromCssColorString('#2ecc71').withAlpha(0.85),
                            heightReference: Cesium.HeightReference.RELATIVE_TO_GROUND
                        }
                    });
                });
            });

        const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
        handler.setInputAction(function(movement) {
            const pickedObject = viewer.scene.pick(movement.position);
            if (Cesium.defined(pickedObject) && pickedObject.id) {
                selectedEntity = pickedObject.id;
                document.getElementById('instruction').style.display = 'none';
                document.getElementById('formFields').style.display = 'block';
                document.getElementById('treeId').value = selectedEntity.properties.id.getValue();
                document.getElementById('treeType').value = selectedEntity.properties.type.getValue();
                document.getElementById('treeDBH').value = selectedEntity.properties.dbh.getValue();
                updateLabels(selectedEntity.properties.agb.getValue(), selectedEntity.properties.c.getValue(), selectedEntity.properties.co2.getValue());
            }
        }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

        document.getElementById('treeDBH').addEventListener('input', function(e) {
            if (!selectedEntity) return;
            const newDBH = parseFloat(e.target.value);
            if (isNaN(newDBH) || newDBH <= 0) return;

            const newMetrics = calculateBiomass(newDBH);
            selectedEntity.properties.dbh.setValue(newDBH);
            selectedEntity.properties.agb.setValue(newMetrics.agb);
            selectedEntity.properties.c.setValue(newMetrics.c);
            selectedEntity.properties.co2.setValue(newMetrics.co2);

            // Co giãn khối Elip khi thay đổi thông số
            selectedEntity.ellipsoid.radii = new Cesium.Cartesian3(newDBH * 0.1, newDBH * 0.1, newDBH * 0.15);
            updateLabels(newMetrics.agb, newMetrics.c, newMetrics.co2);
        });

        function updateLabels(agb, c, co2) {
            document.getElementById('resAGB').innerText = agb + " kg";
            document.getElementById('resC').innerText = c + " kg";
            document.getElementById('resCO2').innerText = co2 + " kg";
        }
    </script>
</body>
</html>
